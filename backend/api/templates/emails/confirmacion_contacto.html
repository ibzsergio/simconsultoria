<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmación de contacto</title>
  </head>
  <body style="margin:0;padding:0;background:#ffffff;font-family:Segoe UI,Roboto,Arial,sans-serif;color:#222222;font-size:16px;line-height:1.55;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff;">
      <tr>
        <td style="padding:24px 20px 32px;">
          <p style="margin:0 0 16px;">Hola {{ nombre_saludo }},</p>
          <p style="margin:0 0 16px;">¡Gracias por contactarnos! Hemos recibido tu mensaje:</p>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:16px 0 20px;">
            <tr>
              <td style="width:4px;background:#2563eb;border-radius:2px;">&nbsp;</td>
              <td style="padding:12px 16px;background:#f1f5f9;border-radius:0 6px 6px 0;">
                {{ mensaje|linebreaksbr }}
              </td>
            </tr>
          </table>
          <p style="margin:0 0 16px;">
            Atenderemos tu solicitud de forma <strong>personalizada</strong> acorde a tu petición. Haremos todo lo posible por procesarla en un plazo de <strong>3 días hábiles</strong>.
          </p>
          <p style="margin:24px 0 0;color:#2563eb;font-weight:500;">
            Saludos cordiales,<br />
            El equipo de {{ marca }}
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
