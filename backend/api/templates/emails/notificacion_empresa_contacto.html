<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8" /></head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #222;">
  <h2 style="margin-top:0;">Nuevo contacto — {{ marca }}</h2>
  <table cellpadding="6" style="border-collapse: collapse;">
    <tr><td><strong>Nombre</strong></td><td>{{ nombre }}</td></tr>
    <tr><td><strong>Correo</strong></td><td><a href="mailto:{{ correo }}">{{ correo }}</a></td></tr>
    <tr><td><strong>Teléfono</strong></td><td>{{ telefono }}</td></tr>
    <tr><td><strong>Tema</strong></td><td>{{ tema }}</td></tr>
  </table>
  <p><strong>Mensaje</strong></p>
  <blockquote style="border-left: 4px solid #ccc; margin: 0; padding-left: 1rem;">{{ mensaje|linebreaksbr }}</blockquote>
  <p style="font-size: 0.85rem; color: #666;">Recibido: {{ creado_fmt }}</p>
</body>
</html>
