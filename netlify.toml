[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build:netlify"

# Mismo origen en el navegador: evita errores CORS. Netlify reenvía /api/* a Render.
[[redirects]]
  from = "/api/*"
  to = "https://simconsultoria-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
